<svg width="100%" height="100%" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base gradient -->
    <linearGradient id="bgAuthGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="100%" stop-color="#030712"></stop>
    </linearGradient>

    <!-- Neon gradients (different vibe) -->
    <radialGradient id="authBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <radialGradient id="authViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <!-- Glow blur -->
    <filter id="authBlur">
      <feGaussianBlur stdDeviation="100"></feGaussianBlur>
    </filter>

    <!-- Subtle grid -->
    <pattern id="authGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1e293b" stroke-width="0.4"></path>
    </pattern>

    <!-- Diagonal neon line gradient -->
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgAuthGradient)"></rect>

  <!-- Grid -->
  <rect width="100%" height="100%" fill="url(#authGrid)" opacity="0.15"></rect>

  <!-- Center glow (focus area for form) -->
  <circle cx="720" cy="450" r="300" fill="url(#authBlue)" filter="url(#authBlur)"></circle>
  <circle cx="720" cy="450" r="250" fill="url(#authViolet)" filter="url(#authBlur)"></circle>

  <!-- Side glow accents -->
  <circle cx="200" cy="700" r="200" fill="url(#authBlue)" filter="url(#authBlur)" opacity="0.4"></circle>
  <circle cx="1300" cy="150" r="220" fill="url(#authViolet)" filter="url(#authBlur)" opacity="0.4"></circle>

  <!-- Diagonal neon lines -->
  <g stroke="url(#lineGlow)" stroke-width="1.2" opacity="0.25">
    <line x1="0" y1="200" x2="1440" y2="600"></line>
    <line x1="0" y1="400" x2="1440" y2="800"></line>
  </g>

</svg>