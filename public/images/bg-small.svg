<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base -->
    <linearGradient id="bgSmallGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="100%" stop-color="#050816"></stop>
    </linearGradient>

    <!-- Neon accents (different palette mix) -->
    <radialGradient id="neonCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <radialGradient id="neonIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <radialGradient id="neonRose" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <!-- Glow -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="60"></feGaussianBlur>
    </filter>

    <!-- Dotted pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e293b"></circle>
    </pattern>

    <!-- Arc gradient -->
    <linearGradient id="arcGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgSmallGradient)"></rect>

  <!-- Dots overlay -->
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.15"></rect>

  <!-- Scattered neon blobs -->
  <circle cx="150" cy="150" r="140" fill="url(#neonCyan)" filter="url(#softBlur)"></circle>
  <circle cx="1000" cy="200" r="180" fill="url(#neonIndigo)" filter="url(#softBlur)"></circle>
  <circle cx="600" cy="650" r="160" fill="url(#neonRose)" filter="url(#softBlur)"></circle>

  <!-- Neon rings (new element vs previous SVGs) -->
  <circle cx="300" cy="600" r="120" fill="none" stroke="url(#arcGlow)" stroke-width="2" opacity="0.3"></circle>
  <circle cx="900" cy="500" r="90" fill="none" stroke="url(#arcGlow)" stroke-width="2" opacity="0.25"></circle>

  <!-- Floating arc lines -->
  <path d="M 200 300 Q 400 100 700 250" stroke="url(#arcGlow)" stroke-width="1.5" fill="none" opacity="0.3"></path>
  <path d="M 500 700 Q 800 500 1100 650" stroke="url(#arcGlow)" stroke-width="1.5" fill="none" opacity="0.25"></path>

</svg>