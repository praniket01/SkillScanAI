<svg width="100%" height="100%" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <!-- Neon gradients -->
    <radialGradient id="neonBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <radialGradient id="neonPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <radialGradient id="neonPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="blurGlow">
      <feGaussianBlur stdDeviation="80"></feGaussianBlur>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5"></path>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"></rect>

  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.2"></rect>

  <!-- Neon blobs -->
  <circle cx="300" cy="200" r="250" fill="url(#neonBlue)" filter="url(#blurGlow)"></circle>
  <circle cx="1100" cy="250" r="300" fill="url(#neonPurple)" filter="url(#blurGlow)"></circle>
  <circle cx="800" cy="700" r="280" fill="url(#neonPink)" filter="url(#blurGlow)"></circle>

  <!-- Subtle lines -->
  <g stroke="url(#neonBlue)" stroke-width="1" opacity="0.2">
    <line x1="0" y1="400" x2="1440" y2="400"></line>
    <line x1="0" y1="600" x2="1440" y2="600"></line>
  </g>

</svg>